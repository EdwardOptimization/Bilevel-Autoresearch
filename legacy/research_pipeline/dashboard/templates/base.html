<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}EvoResearch{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    body { background: #050d1f; color: #e2e8f0; font-family: ui-sans-serif, system-ui, sans-serif; }
    .sidebar { background: #0d1b33; border-right: 1px solid #1e3a5f; }
    .card { background: #0d1b33; border: 1px solid #1e3a5f; border-radius: 12px; }
    .card-inner { background: #0a1628; border: 1px solid #1e3a5f; border-radius: 8px; }

    /* Verdict badges */
    .verdict-pass  { background: #052e16; color: #4ade80; border: 1px solid #166534; }
    .verdict-weak  { background: #422006; color: #fb923c; border: 1px solid #9a3412; }
    .verdict-fail  { background: #3f0e0e; color: #f87171; border: 1px solid #991b1b; }
    .verdict-unknown { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }

    /* Score colors */
    .score-high { color: #4ade80; }
    .score-mid  { color: #fb923c; }
    .score-low  { color: #f87171; }

    /* Lesson type colors */
    .lt-failure_pattern   { background: #3f0e0e; color: #f87171; border: 1px solid #7f1d1d; }
    .lt-successful_pattern { background: #052e16; color: #4ade80; border: 1px solid #14532d; }
    .lt-guardrail  { background: #1c1917; color: #fbbf24; border: 1px solid #78350f; }
    .lt-warning    { background: #1c1917; color: #fb923c; border: 1px solid #9a3412; }
    .lt-decision   { background: #0c1a2e; color: #60a5fa; border: 1px solid #1e3a8a; }

    .nav-link { color: #94a3b8; padding: 8px 12px; border-radius: 8px; display: flex; align-items: center; gap: 8px; transition: all 0.2s; }
    .nav-link:hover, .nav-link.active { background: #1e3a5f; color: #e2e8f0; }

    pre { background: #020913; border: 1px solid #1e3a5f; border-radius: 8px; padding: 16px; overflow-x: auto; font-size: 0.8rem; max-height: 400px; overflow-y: auto; }
    .pill { padding: 2px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; display: inline-block; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #050d1f; }
    ::-webkit-scrollbar-thumb { background: #1e3a5f; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #2563eb; }
  </style>
</head>
<body class="min-h-screen flex">

  <!-- Sidebar -->
  <aside class="sidebar w-56 min-h-screen flex-shrink-0 flex flex-col p-4 fixed top-0 left-0 h-full">
    <a href="/" class="flex items-center gap-2 mb-8 mt-2">
      <span class="text-2xl">🔬</span>
      <div>
        <div class="font-bold text-white text-sm">EvoResearch</div>
        <div class="text-xs text-slate-400">Self-improving pipeline</div>
      </div>
    </a>

    <nav class="space-y-1">
      <a href="/" class="nav-link {% block nav_home %}{% endblock %}">
        <span>📊</span> Dashboard
      </a>
      <a href="/memory" class="nav-link {% block nav_memory %}{% endblock %}">
        <span>🧠</span> Memory
      </a>
    </nav>

    <div class="mt-auto text-xs text-slate-600 pb-2">
      <div>EvoResearch MVP</div>
      <div>AutoResearchClaw × EvoScientist</div>
    </div>
  </aside>

  <!-- Main content -->
  <main class="ml-56 flex-1 p-6 max-w-6xl">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
